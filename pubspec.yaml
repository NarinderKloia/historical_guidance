name: historical_guidance
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # SQLite
  sqflite: ^2.4.2

  # Database Path
  path: ^1.9.1

  path_provider: ^2.1.5

  # QR Code
  # qr_flutter: ^4.1.0

  # mobile_scanner: ^7.0.1

  # Bluetooth Low Energy
  flutter_blue_plus: ^1.35.5

  # Permissions
  permission_handler: ^12.0.1

  # Logging
  logger: ^2.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/database/
    - assets/beacon/